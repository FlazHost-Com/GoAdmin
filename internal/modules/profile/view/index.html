{{define "profile/index"}}{{template "admin/head" .}}
<form method="post" action="/admin/v1/profile" enctype="multipart/form-data" class="max-w-2xl bg-white rounded-xl shadow p-6 space-y-5">
  <input type="hidden" name="_csrf" value="{{._csrf}}">

  <div class="flex items-center gap-4">
    {{if .profile.Picture}}
    <img src="{{.profile.Picture}}" alt="avatar" class="h-16 w-16 rounded-full object-cover border">
    {{else}}
    <div class="h-16 w-16 rounded-full bg-slate-200"></div>
    {{end}}
    <label class="block">
      <span class="text-sm text-slate-600">Foto Profil</span>
      <input type="file" name="picture" accept="image/png,image/jpeg,image/gif,image/webp"
             class="mt-1 block text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-slate-200 file:px-3 file:py-2">
      <span class="text-xs text-slate-400">PNG/JPG/GIF/WebP, maks 2MB.</span>
    </label>
  </div>

  <div class="grid gap-4 sm:grid-cols-2">
    <label class="block">
      <span class="text-sm text-slate-600">Nama</span>
      <input type="text" name="name" value="{{.profile.Name}}" required class="mt-1 w-full border rounded-lg px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-slate-600">Email</span>
      <input type="email" name="email" value="{{.profile.Email}}" required class="mt-1 w-full border rounded-lg px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-slate-600">Telepon</span>
      <input type="text" name="phone" value="{{.profile.Phone}}" class="mt-1 w-full border rounded-lg px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-slate-600">Timezone</span>
      <input type="text" name="timezone" value="{{.profile.Timezone}}" class="mt-1 w-full border rounded-lg px-3 py-2">
    </label>
  </div>

  <div class="border-t pt-5">
    <p class="text-sm text-slate-500 mb-3">Kosongkan password bila tidak ingin mengubahnya.</p>
    <div class="grid gap-4 sm:grid-cols-2">
      <label class="block">
        <span class="text-sm text-slate-600">Password Baru</span>
        <input type="password" name="password" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="••••••••">
      </label>
      <label class="block">
        <span class="text-sm text-slate-600">Konfirmasi Password</span>
        <input type="password" name="password_confirmation" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="••••••••">
      </label>
    </div>
  </div>

  <div>
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium">
      Simpan
    </button>
  </div>
</form>
{{template "admin/foot" .}}{{end}}
