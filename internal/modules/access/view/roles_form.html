{{define "roles/form"}}{{template "admin/head" .}}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">Role Management</h1>
</div>

<div class="tw-card p-6">
  <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">Role Form</h2>
  <form method="post" action="{{.action}}">
    <input type="hidden" name="_csrf" value="{{._csrf}}">
    <div class="mb-3"><label class="form-label fw-semibold">Name</label><input type="text" name="name" required value="{{if .role}}{{.role.Name}}{{end}}" class="form-control"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Status</label>
      <select name="status" class="form-control">
        <option value="Active" {{if .role}}{{if eq .role.Status "Active"}}selected{{end}}{{else}}selected{{end}}>Active</option>
        <option value="Inactive" {{if .role}}{{if eq .role.Status "Inactive"}}selected{{end}}{{end}}>Inactive</option>
      </select>
    </div>
    <div class="mb-3"><label class="form-label fw-semibold">Description</label><input type="text" name="description" value="{{if .role}}{{.role.Description}}{{end}}" class="form-control"></div>
    <div class="mb-4">
      <label class="form-label fw-semibold d-block">Permissions</label>
      <div class="d-flex flex-wrap gap-3 p-2 rounded border" style="max-height:280px;overflow:auto">
        {{range .permissions}}
        <label class="d-flex align-items-center gap-2" style="min-width:200px"><input type="checkbox" name="permission_ids" value="{{.ID}}" class="w-4 h-4" {{if index $.selected .ID}}checked{{end}}><span class="font-mono text-sm">{{.Name}}</span></label>
        {{else}}<span class="text-muted small">Belum ada permission.</span>{{end}}
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary-tw px-4 py-2"><i class="fas fa-save me-1"></i> Save</button>
      <a href="/admin/v1/access/role" class="btn btn-danger px-4 py-2">Back</a>
    </div>
  </form>
</div>
{{template "admin/foot" .}}{{end}}
